name: Contribution Filler

on:
  schedule:
    - cron: '0 8,14,20 * * *'
  workflow_dispatch:

jobs:
  contribute:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Update contribution log
        run: |
          echo "$(date -u '+%Y-%m-%dT%H:%M:%SZ') - Automated contribution" >> .contribution-log
          git add .contribution-log

      - name: Commit and push
        run: |
          git config user.name "FenoVictor"
          git config user.email "feno.victor@example.com"
          git diff --cached --quiet || git commit -m "chore: daily contribution $(date -u '+%Y-%m-%d')"
          git push
